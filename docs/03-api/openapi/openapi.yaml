openapi: 3.1.0
info:
  title: DGLEA Masonic Passport API
  version: 1.0.0
  summary: Formal API specification for the DGLEA Masonic Passport platform.
  description: |
    Workflow-explicit, permission-aware, server-enforced API for the DGLEA Masonic Passport.

    Design constraints:
    - Backend is authoritative for permissions and lifecycle transitions.
    - Verification workflow transitions are explicit endpoints.
    - District/lodge/member scope checks are mandatory server-side.
servers:
  - url: /
    description: Version 1 API

tags:
  - name: Auth
  - name: Me
  - name: Members
  - name: MentorAssignments
  - name: PassportTemplates
  - name: PassportRecords
  - name: Verification
  - name: Dashboards
  - name: Reports
  - name: FeatureFlags
  - name: Audit

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user and issue tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke session tokens
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated session context
      responses:
        '200':
          description: Session context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /me:
    get:
      tags: [Me]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /me/permissions:
    get:
      tags: [Me]
      summary: Get current user effective permissions and scopes
      responses:
        '200':
          description: Effective permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsSummary'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /me/assigned-members:
    get:
      tags: [MentorAssignments]
      summary: List members assigned to current mentor user
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Assigned members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMemberProfileList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /members:
    get:
      tags: [Members]
      summary: List member profiles by scope
      parameters:
        - name: lodgeId
          in: query
          schema: { type: string }
        - name: degreeStatus
          in: query
          schema:
            $ref: '#/components/schemas/MemberDegreeStatus'
        - name: status
          in: query
          schema: { type: string }
        - name: mentorUserId
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMemberProfileList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags: [Members]
      summary: Create member profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemberRequest'
      responses:
        '201':
          description: Member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    get:
      tags: [Members]
      summary: Get member profile
      responses:
        '200':
          description: Member profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags: [Members]
      summary: Update member profile (non-milestone fields)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /members/{memberId}/milestones:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    patch:
      tags: [Members]
      summary: Update member milestones (admin correction flow)
      description: Separate from general profile patch to preserve governance and audit intent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMilestonesRequest'
      responses:
        '200':
          description: Milestones updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /members/{memberId}/mentor-assignments:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    get:
      tags: [MentorAssignments]
      summary: List mentor assignments for member
      responses:
        '200':
          description: Mentor assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorAssignmentList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    post:
      tags: [MentorAssignments]
      summary: Create mentor assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMentorAssignmentRequest'
      responses:
        '201':
          description: Mentor assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorAssignment'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /mentor-assignments/{assignmentId}:
    parameters:
      - $ref: '#/components/parameters/AssignmentId'
    patch:
      tags: [MentorAssignments]
      summary: End or update mentor assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMentorAssignmentRequest'
      responses:
        '200':
          description: Mentor assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorAssignment'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /passport/sections:
    get:
      tags: [PassportTemplates]
      summary: List passport section templates
      responses:
        '200':
          description: Passport section templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PassportSectionTemplate'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /passport/sections/{sectionId}/items:
    parameters:
      - $ref: '#/components/parameters/SectionId'
    get:
      tags: [PassportTemplates]
      summary: List section template items
      parameters:
        - name: includeLodgeSupplements
          in: query
          schema: { type: boolean, default: true }
        - name: lodgeId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Section template items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LearningOutcomeTemplate'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /members/{memberId}/passport-records:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    get:
      tags: [PassportRecords]
      summary: List passport records for member
      parameters:
        - name: sectionId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PassportRecordStatus'
        - name: recordType
          in: query
          schema:
            $ref: '#/components/schemas/ItemType'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Member passport records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPassportRecordList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    post:
      tags: [PassportRecords]
      summary: Create draft passport record
      description: Creates records in DRAFT status only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePassportRecordRequest'
      responses:
        '201':
          description: Draft record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /members/{memberId}/passport-summary:
    parameters:
      - $ref: '#/components/parameters/MemberId'
    get:
      tags: [PassportRecords]
      summary: Brother passport summary
      responses:
        '200':
          description: Passport summary payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrotherPassportSummary'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /passport-records/{recordId}:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    get:
      tags: [PassportRecords]
      summary: Get passport record
      responses:
        '200':
          description: Passport record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    patch:
      tags: [PassportRecords]
      summary: Update draft passport record
      description: |
        Server enforces that VERIFIED, SUPERSEDED, or ARCHIVED records are not
        casually edited via this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePassportRecordRequest'
      responses:
        '200':
          description: Passport record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /passport-records/{recordId}/versions:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    get:
      tags: [PassportRecords]
      summary: List record versions
      responses:
        '200':
          description: Record versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PassportRecordVersion'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /passport-records/{recordId}/submit:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Submit passport record for verification
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRecordRequest'
      responses:
        '200':
          description: Record submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'

  /passport-records/{recordId}/verify:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Verify submitted passport record
      description: |
        Server-enforced checks include role, scope, lodge policy, and valid prior state
        (SUBMITTED or NEEDS_CLARIFICATION).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRecordRequest'
      responses:
        '200':
          description: Record verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'

  /passport-records/{recordId}/reject:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Reject submitted passport record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRecordRequest'
      responses:
        '200':
          description: Record rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /passport-records/{recordId}/clarification:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Request clarification for a submitted record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClarificationRequest'
      responses:
        '200':
          description: Clarification requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /passport-records/{recordId}/override:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Override prior decision (audited)
      description: Lodge Mentor or exceptional admin path only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverrideDecisionRequest'
      responses:
        '200':
          description: Decision overridden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /passport-records/{recordId}/supersede:
    parameters:
      - $ref: '#/components/parameters/RecordId'
    post:
      tags: [Verification]
      summary: Supersede verified record with replacement link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupersedeRecordRequest'
      responses:
        '200':
          description: Record superseded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassportRecord'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/InvalidStateTransitionError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /verification-queue:
    get:
      tags: [Verification]
      summary: List pending verification queue
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [ASSIGNED, LODGE, DISTRICT]
            default: ASSIGNED
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PassportRecordStatus'
        - name: staleOnly
          in: query
          schema: { type: boolean, default: false }
        - name: lodgeId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Verification queue items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVerificationQueueList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /me/dashboard:
    get:
      tags: [Dashboards]
      summary: Brother dashboard summary
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrotherDashboard'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /me/mentor-dashboard:
    get:
      tags: [Dashboards]
      summary: Mentor dashboard summary
      responses:
        '200':
          description: Mentor dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorDashboard'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /lodges/{lodgeId}/dashboard:
    parameters:
      - $ref: '#/components/parameters/LodgeId'
    get:
      tags: [Dashboards]
      summary: Lodge dashboard summary
      responses:
        '200':
          description: Lodge dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LodgeDashboard'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /districts/{districtId}/dashboard:
    parameters:
      - $ref: '#/components/parameters/DistrictId'
    get:
      tags: [Dashboards]
      summary: District dashboard summary
      responses:
        '200':
          description: District dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistrictDashboard'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /districts/{districtId}/analytics:
    parameters:
      - $ref: '#/components/parameters/DistrictId'
    get:
      tags: [Dashboards]
      summary: District analytics drill-down
      parameters:
        - name: lodgeId
          in: query
          schema: { type: string }
        - name: metric
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: District analytics results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistrictAnalyticsResponse'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /lodges/{lodgeId}/reports:
    parameters:
      - $ref: '#/components/parameters/LodgeId'
    post:
      tags: [Reports]
      summary: Generate lodge report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '202':
          description: Report generation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSnapshot'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /districts/{districtId}/reports:
    parameters:
      - $ref: '#/components/parameters/DistrictId'
    post:
      tags: [Reports]
      summary: Generate district report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '202':
          description: Report generation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSnapshot'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports:
    get:
      tags: [Reports]
      summary: List generated reports visible to caller
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Report snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReportList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'

  /reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get report metadata
      responses:
        '200':
          description: Report metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSnapshot'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /feature-flags:
    get:
      tags: [FeatureFlags]
      summary: List feature flags
      responses:
        '200':
          description: Feature flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureFlag'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags: [FeatureFlags]
      summary: Create feature flag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeatureFlagRequest'
      responses:
        '201':
          description: Feature flag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlag'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /feature-flags/{flagId}:
    parameters:
      - $ref: '#/components/parameters/FlagId'
    patch:
      tags: [FeatureFlags]
      summary: Update feature flag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureFlagRequest'
      responses:
        '200':
          description: Feature flag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlag'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /feature-flags/{flagId}/targets:
    parameters:
      - $ref: '#/components/parameters/FlagId'
    post:
      tags: [FeatureFlags]
      summary: Upsert feature flag targets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureFlagTargetUpsertRequest'
      responses:
        '200':
          description: Targets updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureFlagTarget'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /audit-events:
    get:
      tags: [Audit]
      summary: List audit events
      parameters:
        - name: entityType
          in: query
          schema: { type: string }
        - name: entityId
          in: query
          schema: { type: string }
        - name: actorUserId
          in: query
          schema: { type: string }
        - name: lodgeId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditEventList'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /audit-events/{eventId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Audit]
      summary: Get audit event
      responses:
        '200':
          description: Audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        '401':
          $ref: '#/components/responses/UnauthenticatedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MemberId:
      name: memberId
      in: path
      required: true
      schema: { type: string }
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema: { type: string }
    SectionId:
      name: sectionId
      in: path
      required: true
      schema: { type: string }
    RecordId:
      name: recordId
      in: path
      required: true
      schema: { type: string }
    LodgeId:
      name: lodgeId
      in: path
      required: true
      schema: { type: string }
    DistrictId:
      name: districtId
      in: path
      required: true
      schema: { type: string }
    ReportId:
      name: reportId
      in: path
      required: true
      schema: { type: string }
    FlagId:
      name: flagId
      in: path
      required: true
      schema: { type: string }
    EventId:
      name: eventId
      in: path
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }

  responses:
    UnauthenticatedError:
      description: Authentication is required or token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: UNAUTHENTICATED
              message: Authentication required.
              details: null
    ForbiddenError:
      description: Authenticated but not authorized for requested scope/action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: FORBIDDEN
              message: You do not have permission to perform this action.
              details: null
    NotFoundError:
      description: Requested resource was not found in caller scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found.
              details: null
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: VALIDATION_ERROR
              message: One or more validation errors occurred.
              details:
                fields:
                  eventDate: Must be a valid date.
    InvalidStateTransitionError:
      description: Requested workflow transition is not valid from current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: INVALID_STATE_TRANSITION
              message: Record cannot be verified from current status.
              details:
                status: DRAFT

  schemas:
    RoleCode:
      type: string
      enum:
        - BROTHER
        - PERSONAL_MENTOR
        - LODGE_MENTOR
        - LODGE_REVIEWER
        - LODGE_ADMIN
        - DISTRICT_MENTOR
        - DISTRICT_ADMIN
        - SYSTEM_ADMIN

    MemberDegreeStatus:
      type: string
      enum:
        - ENTERED_APPRENTICE
        - FELLOW_CRAFT
        - MASTER_MASON
        - PREPARING_FOR_OFFICE
        - INACTIVE
        - ARCHIVED

    PassportRecordStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - NEEDS_CLARIFICATION
        - VERIFIED
        - REJECTED
        - SUPERSEDED
        - ARCHIVED

    MentorRoleType:
      type: string
      enum: [PERSONAL_MENTOR, LODGE_MENTOR]

    VerificationPolicy:
      type: string
      enum:
        - PERSONAL_MENTOR_ONLY
        - LODGE_MENTOR_ONLY
        - EITHER_PERSONAL_OR_LODGE
        - DUAL_VERIFICATION

    ItemType:
      type: string
      enum:
        - LEARNING_OUTCOME
        - MENTOR_SESSION
        - VISITATION
        - RITUAL_PARTICIPATION
        - MILESTONE
        - ANNUAL_COMMUNICATION
        - PREPARING_FOR_OFFICE
        - CUSTOM_SUPPLEMENT

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - VALIDATION_ERROR
                - INVALID_STATE_TRANSITION
                - CONFLICT
                - FEATURE_DISABLED
                - RATE_LIMITED
                - INTERNAL_ERROR
            message:
              type: string
            details:
              nullable: true

    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalItems: { type: integer }
        totalPages: { type: integer }

    UserProfile:
      type: object
      required: [id, email, displayName, status]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        mobileNumber: { type: string, nullable: true }
        givenName: { type: string, nullable: true }
        familyName: { type: string, nullable: true }
        displayName: { type: string }
        status: { type: string }
        lastLoginAt: { type: string, format: date-time, nullable: true }

    PermissionsSummary:
      type: object
      required: [roles, scopes, capabilities]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleCode'
        scopes:
          type: object
          required: [lodges, districts, assignedMemberIds]
          properties:
            lodges:
              type: array
              items: { type: string }
            districts:
              type: array
              items: { type: string }
            assignedMemberIds:
              type: array
              items: { type: string }
        capabilities:
          type: array
          items: { type: string }

    AuthTokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }

    AuthSessionResponse:
      allOf:
        - $ref: '#/components/schemas/AuthTokenResponse'
        - type: object
          required: [user, roles, scopes]
          properties:
            user:
              $ref: '#/components/schemas/UserProfile'
            roles:
              type: array
              items:
                $ref: '#/components/schemas/RoleCode'
            scopes:
              type: object
              properties:
                lodges:
                  type: array
                  items: { type: string }
                districts:
                  type: array
                  items: { type: string }
                assignedMemberIds:
                  type: array
                  items: { type: string }
            featureFlags:
              type: array
              items: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    MemberProfile:
      type: object
      required: [id, userId, districtId, lodgeId, degreeStatus, status]
      properties:
        id: { type: string }
        userId: { type: string }
        districtId: { type: string }
        lodgeId: { type: string }
        membershipNumber: { type: string, nullable: true }
        dateJoinedPlatform: { type: string, format: date, nullable: true }
        degreeStatus:
          $ref: '#/components/schemas/MemberDegreeStatus'
        initiatedAt: { type: string, format: date, nullable: true }
        passedAt: { type: string, format: date, nullable: true }
        raisedAt: { type: string, format: date, nullable: true }
        solomonRegisteredAt: { type: string, format: date, nullable: true }
        status: { type: string }

    CreateMemberRequest:
      type: object
      required: [userId, districtId, lodgeId, degreeStatus]
      properties:
        userId: { type: string }
        districtId: { type: string }
        lodgeId: { type: string }
        membershipNumber: { type: string, nullable: true }
        degreeStatus:
          $ref: '#/components/schemas/MemberDegreeStatus'

    UpdateMemberRequest:
      type: object
      properties:
        membershipNumber: { type: string, nullable: true }
        degreeStatus:
          $ref: '#/components/schemas/MemberDegreeStatus'
        status: { type: string }

    UpdateMilestonesRequest:
      type: object
      properties:
        initiatedAt: { type: string, format: date, nullable: true }
        passedAt: { type: string, format: date, nullable: true }
        raisedAt: { type: string, format: date, nullable: true }
      additionalProperties: false

    MentorAssignment:
      type: object
      required:
        [id, memberProfileId, mentorUserId, mentorRoleType, lodgeId, isPrimary, status]
      properties:
        id: { type: string }
        memberProfileId: { type: string }
        mentorUserId: { type: string }
        mentorRoleType:
          $ref: '#/components/schemas/MentorRoleType'
        lodgeId: { type: string }
        isPrimary: { type: boolean }
        activeFrom: { type: string, format: date-time, nullable: true }
        activeTo: { type: string, format: date-time, nullable: true }
        status: { type: string }

    MentorAssignmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MentorAssignment'

    CreateMentorAssignmentRequest:
      type: object
      required: [mentorUserId, mentorRoleType, isPrimary]
      properties:
        mentorUserId: { type: string }
        mentorRoleType:
          $ref: '#/components/schemas/MentorRoleType'
        isPrimary: { type: boolean }

    UpdateMentorAssignmentRequest:
      type: object
      properties:
        activeTo: { type: string, format: date-time }
        status: { type: string }

    PassportSectionTemplate:
      type: object
      required: [id, code, name, displayOrder, isDistrictCore, status]
      properties:
        id: { type: string }
        districtId: { type: string, nullable: true }
        code: { type: string }
        name: { type: string }
        displayOrder: { type: integer }
        description: { type: string, nullable: true }
        isDistrictCore: { type: boolean }
        status: { type: string }

    LearningOutcomeTemplate:
      type: object
      required:
        [id, sectionTemplateId, itemCode, title, itemType, displayOrder, isDistrictCore, status]
      properties:
        id: { type: string }
        sectionTemplateId: { type: string }
        lodgeId: { type: string, nullable: true }
        itemCode: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        itemType:
          $ref: '#/components/schemas/ItemType'
        displayOrder: { type: integer }
        verificationRequired: { type: boolean, default: true }
        isDistrictCore: { type: boolean }
        status: { type: string }

    PassportRecord:
      type: object
      required:
        [id, memberProfileId, districtId, lodgeId, sectionTemplateId, templateItemId, status, currentVersion, isOfficialProgress, createdAt, updatedAt]
      properties:
        id: { type: string }
        memberProfileId: { type: string }
        districtId: { type: string }
        lodgeId: { type: string }
        sectionTemplateId: { type: string }
        templateItemId: { type: string }
        templateIsDistrictCore: { type: boolean }
        templateLodgeId: { type: string, nullable: true }
        note: { type: string, nullable: true }
        eventDate: { type: string, format: date, nullable: true }
        reviewReason: { type: string, nullable: true }
        supersedesRecordId: { type: string, nullable: true }
        status:
          $ref: '#/components/schemas/PassportRecordStatus'
        currentVersion: { type: integer }
        isOfficialProgress: { type: boolean }
        submittedAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    PassportRecordVersion:
      type: object
      required: [id, passportRecordId, versionNumber, payloadJson, createdByUserId, createdAt]
      properties:
        id: { type: string }
        passportRecordId: { type: string }
        versionNumber: { type: integer }
        payloadJson: { type: object, additionalProperties: true }
        changeReason: { type: string, nullable: true }
        createdByUserId: { type: string }
        createdAt: { type: string, format: date-time }

    VerificationDecision:
      type: object
      required:
        [id, passportRecordId, decisionType, priorStatus, newStatus, actorUserId, actorRoleCode, actedAt]
      properties:
        id: { type: string }
        passportRecordId: { type: string }
        decisionType:
          type: string
          enum:
            - SUBMITTED
            - VERIFIED
            - REJECTED
            - REQUESTED_CLARIFICATION
            - OVERRIDDEN
            - SUPERSEDED
            - ARCHIVED
        priorStatus:
          $ref: '#/components/schemas/PassportRecordStatus'
        newStatus:
          $ref: '#/components/schemas/PassportRecordStatus'
        decisionReason: { type: string, nullable: true }
        actorUserId: { type: string }
        actorRoleCode:
          $ref: '#/components/schemas/RoleCode'
        actedAt: { type: string, format: date-time }

    VerificationQueueItem:
      type: object
      required: [id, passportRecordId, memberProfileId, lodgeId, currentStatus, submittedAt, isStale]
      properties:
        id: { type: string }
        passportRecordId: { type: string }
        memberProfileId: { type: string }
        assignedVerifierUserId: { type: string, nullable: true }
        lodgeId: { type: string }
        currentStatus:
          $ref: '#/components/schemas/PassportRecordStatus'
        submittedAt: { type: string, format: date-time }
        staleAfterAt: { type: string, format: date-time, nullable: true }
        isStale: { type: boolean }

    BrotherDashboard:
      type: object
      properties:
        memberProfileId: { type: string }
        degreeStatus:
          $ref: '#/components/schemas/MemberDegreeStatus'
        verifiedCount: { type: integer }
        pendingCount: { type: integer }
        clarificationCount: { type: integer }
        recentRecords:
          type: array
          items:
            $ref: '#/components/schemas/PassportRecord'

    BrotherPassportSummary:
      type: object
      required: [memberProfileId, sections]
      properties:
        memberProfileId: { type: string }
        sections:
          type: array
          items:
            $ref: '#/components/schemas/BrotherPassportSectionSummary'

    BrotherPassportSectionSummary:
      type: object
      required: [sectionCode, sectionName, progressState]
      properties:
        sectionCode: { type: string }
        sectionName: { type: string }
        progressState:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, VERIFIED]
        latestStatus:
          $ref: '#/components/schemas/PassportRecordStatus'
        lastActivityAt: { type: string, format: date-time, nullable: true }
        pendingAction:
          type: string
          nullable: true
          enum: [SUBMIT_DRAFT, AWAITING_REVIEW, RESPOND_TO_CLARIFICATION]

    MentorDashboard:
      type: object
      properties:
        assignedBrotherCount: { type: integer }
        pendingVerificationCount: { type: integer }
        staleCount: { type: integer }
        queue:
          type: array
          items:
            $ref: '#/components/schemas/VerificationQueueItem'

    LodgeDashboard:
      type: object
      properties:
        lodgeId: { type: string }
        activeMembersCount: { type: integer }
        pendingVerificationsCount: { type: integer }
        verifiedItemsCount: { type: integer }
        staleCount: { type: integer }

    DistrictDashboard:
      type: object
      properties:
        districtId: { type: string }
        lodgesCount: { type: integer }
        activeMembersCount: { type: integer }
        pendingVerificationsCount: { type: integer }
        verifiedItemsCount: { type: integer }
        staleCount: { type: integer }

    DistrictAnalyticsResponse:
      type: object
      properties:
        districtId: { type: string }
        from: { type: string, format: date, nullable: true }
        to: { type: string, format: date, nullable: true }
        items:
          type: array
          items:
            $ref: '#/components/schemas/DistrictAnalyticsItem'

    DistrictAnalyticsItem:
      type: object
      properties:
        lodgeId: { type: string }
        activeMembersCount: { type: integer }
        pendingVerificationsCount: { type: integer }
        verifiedItemsCount: { type: integer }
        inactiveMembersCount: { type: integer }
        avgVerificationTurnaroundHours: { type: number }

    ReportSnapshot:
      type: object
      required: [id, reportType, scopeType, scopeId, generatedByUserId, generatedAt]
      properties:
        id: { type: string }
        reportType: { type: string }
        scopeType: { type: string, enum: [LODGE, DISTRICT] }
        scopeId: { type: string }
        generatedByUserId: { type: string }
        generatedAt: { type: string, format: date-time }
        fileUri: { type: string, nullable: true }
        parametersJson: { type: object, additionalProperties: true }

    FeatureFlag:
      type: object
      required: [id, key, name, flagType, defaultState, status]
      properties:
        id: { type: string }
        key: { type: string }
        name: { type: string }
        flagType:
          type: string
          enum: [RELEASE, OPS, PERMISSION]
        defaultState: { type: boolean }
        ownerUserId: { type: string, nullable: true }
        description: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [ACTIVE, INACTIVE] }

    FeatureFlagTarget:
      type: object
      required: [id, featureFlagId, targetType, targetValue]
      properties:
        id: { type: string }
        featureFlagId: { type: string }
        targetType:
          type: string
          enum: [LODGE, ROLE, DISTRICT, ENVIRONMENT]
        targetValue: { type: string }
        createdAt: { type: string, format: date-time }

    AuditEvent:
      type: object
      required:
        [id, eventType, entityType, entityId, actorUserId, actorRoleCode, createdAt]
      properties:
        id: { type: string }
        eventType: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        actorUserId: { type: string }
        actorRoleCode:
          $ref: '#/components/schemas/RoleCode'
        districtId: { type: string, nullable: true }
        lodgeId: { type: string, nullable: true }
        priorState: { type: string, nullable: true }
        newState: { type: string, nullable: true }
        reason: { type: string, nullable: true }
        metadataJson: { type: object, additionalProperties: true, nullable: true }
        createdAt: { type: string, format: date-time }

    GenerateReportRequest:
      type: object
      required: [reportType]
      properties:
        reportType:
          type: string
          enum:
            - LODGE_PROGRESS_SUMMARY
            - DISTRICT_PROGRESS_SUMMARY
            - ADOPTION_METRICS
            - EXCEPTION_SUMMARY
        from: { type: string, format: date, nullable: true }
        to: { type: string, format: date, nullable: true }

    CreateFeatureFlagRequest:
      type: object
      required: [key, name, flagType, defaultState]
      properties:
        key: { type: string }
        name: { type: string }
        flagType:
          type: string
          enum: [RELEASE, OPS, PERMISSION]
        defaultState: { type: boolean }
        ownerUserId: { type: string, nullable: true }
        description: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }

    UpdateFeatureFlagRequest:
      type: object
      properties:
        name: { type: string }
        defaultState: { type: boolean }
        description: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [ACTIVE, INACTIVE] }

    FeatureFlagTargetUpsertRequest:
      type: object
      required: [targets]
      properties:
        targets:
          type: array
          items:
            type: object
            required: [targetType, targetValue]
            properties:
              targetType:
                type: string
                enum: [LODGE, ROLE, DISTRICT, ENVIRONMENT]
              targetValue: { type: string }

    CreatePassportRecordRequest:
      type: object
      required: [districtId, lodgeId, sectionTemplateId, templateItemId]
      properties:
        districtId: { type: string }
        lodgeId: { type: string }
        sectionTemplateId: { type: string }
        templateItemId: { type: string }
        eventDate: { type: string, format: date, nullable: true }
        note: { type: string, nullable: true }

    UpdatePassportRecordRequest:
      type: object
      properties:
        eventDate: { type: string, format: date, nullable: true }
        note: { type: string, nullable: true }

    SubmitRecordRequest:
      type: object
      properties:
        note: { type: string, nullable: true }

    VerifyRecordRequest:
      type: object
      properties:
