version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dglea_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dglea_passport}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dglea_passport}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dglea_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dglea_passport?schema=public}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/firebase-service-account.json}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-local-dev}
      ALLOW_DEV_AUTH: ${ALLOW_DEV_AUTH:-true}
      DEV_AUTH_USER_ID: ${DEV_AUTH_USER_ID:-00000000-0000-0000-0000-000000000000}
    ports:
      - "3000:3000"
    volumes:
      - ./secrets:/app/secrets:ro

volumes:
  postgres_data:
